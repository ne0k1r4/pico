<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>loading...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* TODO: let users pick accent color in config */
    :root {
      --bg:      #111118;
      --surface: #1a1a24;
      --border:  #2a2a3a;
      --accent:  #7c6aff;
      --text:    #e8e8f0;
      --muted:   #666680;
      --bar-h:   42px;
      --r:       5px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* ── toolbar ── */
    #bar {
      height: var(--bar-h);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    #bar.hidden { display: none !important; }

    /* bit of left padding on mac so traffic lights don't overlap */
    body.mac #bar { padding-left: 76px; }

    .btn {
      -webkit-app-region: no-drag;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border: none; border-radius: var(--r);
      background: transparent; color: var(--muted);
      cursor: pointer; font-size: 14px;
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0;
      user-select: none;
    }
    .btn:hover  { background: var(--border); color: var(--text); }
    .btn:active { transform: scale(0.9); }
    .btn:disabled { opacity: 0.25; pointer-events: none; }

    /* url bar */
    #urlwrap {
      -webkit-app-region: no-drag;
      flex: 1;
      display: flex; align-items: center; gap: 6px;
      height: 28px; padding: 0 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      transition: border-color 0.15s;
      min-width: 0;
    }
    #urlwrap:focus-within { border-color: var(--accent); }

    #fav {
      width: 14px; height: 14px;
      object-fit: contain; flex-shrink: 0;
      border-radius: 2px;
      opacity: 0.75;
    }

    #urlinput {
      flex: 1; min-width: 0;
      background: none; border: none; outline: none;
      color: var(--text); font-size: 12px;
      font-family: inherit;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── progress ── */
    #progress {
      position: fixed; top: 0; left: 0;
      height: 2px; width: 0;
      background: var(--accent);
      transition: width 0.2s ease, opacity 0.35s;
      z-index: 9999; pointer-events: none;
      box-shadow: 0 0 8px var(--accent);
    }
    #progress.idle { opacity: 0; }

    /* ── webview ── */
    #wv {
      display: flex;
      width: 100%;
      /* height set by js depending on toolbar visibility */
      border: none;
    }

    /* ── frameless drag zone ── */
    #dragzone {
      display: none;
      position: fixed; top: 0; left: 0;
      width: 100%; height: 32px;
      -webkit-app-region: drag;
      z-index: 100; pointer-events: none;
    }
    body.frameless #dragzone { display: block; }
    /* mac inset — avoid traffic lights area */
    body.frameless.mac #dragzone { left: 70px; }

    /* ── splash ── */
    #splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg); z-index: 50;
      gap: 16px;
      transition: opacity 0.25s;
    }
    #splash.gone { opacity: 0; pointer-events: none; }

    #splash-name { color: var(--muted); font-size: 13px; letter-spacing: 0.03em; }

    .ring {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── offline banner ── */
    #offline {
      display: none;
      position: fixed; top: var(--bar-h); left: 0; right: 0;
      padding: 8px 14px;
      background: #c0392b;
      color: #fff; font-size: 12px;
      text-align: center; z-index: 40;
    }
    #offline.show { display: block; }
  </style>
</head>
<body>
  <div id="progress" class="idle"></div>
  <div id="dragzone"></div>
  <div id="offline">you're offline — some things might not work</div>

  <div id="bar">
    <button class="btn" id="back"    title="Back">&#8592;</button>
    <button class="btn" id="fwd"     title="Forward">&#8594;</button>
    <button class="btn" id="reload"  title="Reload">&#8635;</button>
    <div id="urlwrap">
      <img id="fav" src="" alt="" />
      <input id="urlinput" type="text" spellcheck="false" autocomplete="off" />
    </div>
    <button class="btn" id="home" title="Home">&#8962;</button>
  </div>

  <webview id="wv" allowpopups partition="persist:web2app"></webview>

  <div id="splash">
    <div class="ring"></div>
    <div id="splash-name">loading...</div>
  </div>

  <script>
    const api = window.electronAPI
    let cfg = {}

    const wv       = document.getElementById('wv')
    const bar      = document.getElementById('bar')
    const urlinput = document.getElementById('urlinput')
    const fav      = document.getElementById('fav')
    const progress = document.getElementById('progress')
    const splash   = document.getElementById('splash')
    const offline  = document.getElementById('offline')

    async function boot() {
      cfg = await api.getConfig()

      document.title = cfg.name
      document.getElementById('splash-name').textContent = cfg.name

      // platform class for mac-specific layout tweaks
      if (navigator.userAgent.includes('Mac')) document.body.classList.add('mac')
      if (cfg.windowStyle === 'frameless') document.body.classList.add('frameless')

      // toolbar visibility
      const showBar = cfg.showToolbar && cfg.windowStyle !== 'frameless'
      if (!showBar) bar.classList.add('hidden')

      // set webview height — fills remaining space
      wv.style.height = showBar ? `calc(100vh - ${getComputedStyle(document.documentElement).getPropertyValue('--bar-h')})` : '100vh'

      wv.src = cfg.url
      urlinput.value = cfg.url

      // inject custom css on every page load if configured
      if (cfg.customCSS && cfg.customCSS.trim()) {
        wv.addEventListener('dom-ready', () => {
          wv.insertCSS(cfg.customCSS).catch(() => {})
        })
      }

      wireEvents()
      wireIpc()
      watchOffline()
    }

    function wireEvents() {
      document.getElementById('back').onclick   = () => wv.canGoBack()    && wv.goBack()
      document.getElementById('fwd').onclick    = () => wv.canGoForward() && wv.goForward()
      document.getElementById('reload').onclick = () => wv.reload()
      document.getElementById('home').onclick   = () => go(cfg.url)

      urlinput.addEventListener('keydown', e => {
        if (e.key === 'Enter')  go(urlinput.value)
        if (e.key === 'Escape') { urlinput.value = wv.getURL(); urlinput.blur() }
      })
      // select all text when focused — easier to replace url
      urlinput.addEventListener('focus', () => urlinput.select())

      // progress
      wv.addEventListener('did-start-loading', () => {
        progress.style.width = '30%'
        progress.classList.remove('idle')
      })
      wv.addEventListener('did-stop-loading', () => {
        progress.style.width = '100%'
        setTimeout(() => progress.classList.add('idle'), 400)
        splash.classList.add('gone')
        syncButtons()
      })

      // keep url bar in sync
      wv.addEventListener('did-navigate',         e => { urlinput.value = e.url; updateFav(e.url); syncButtons() })
      wv.addEventListener('did-navigate-in-page', e => { if (e.isMainFrame) { urlinput.value = e.url; syncButtons() } })

      // window title tracks page title
      wv.addEventListener('page-title-updated', e => {
        document.title = e.title ? `${e.title} — ${cfg.name}` : cfg.name
      })

      // handle new-window events — same-origin = allow, external = browser
      wv.addEventListener('new-window', e => {
        try {
          const same = new URL(e.url).origin === new URL(cfg.url).origin
          if (!same) api.openExternal(e.url)
        } catch { api.openExternal(e.url) }
      })
    }

    // smart navigation — handles bare domains and search queries
    function go(raw) {
      let url = (raw || '').trim()
      if (!url) return

      if (url.startsWith('http://') || url.startsWith('https://')) {
        // fine as-is
      } else if (url.includes('.') && !url.includes(' ')) {
        url = 'https://' + url
      } else {
        // treat as search query
        url = 'https://www.google.com/search?q=' + encodeURIComponent(url)
      }

      wv.src = url
      urlinput.value = url
    }

    function syncButtons() {
      document.getElementById('back').disabled = !wv.canGoBack()
      document.getElementById('fwd').disabled  = !wv.canGoForward()
    }

    function updateFav(url) {
      try {
        fav.src = new URL(url).origin + '/favicon.ico'
        fav.style.display = 'block'
      } catch {
        fav.style.display = 'none'
      }
    }

    function wireIpc() {
      api.onNavigate(action => {
        if (action === 'back')    { wv.canGoBack()    && wv.goBack() }
        if (action === 'forward') { wv.canGoForward() && wv.goForward() }
        if (action === 'home')    { go(cfg.url) }
      })
    }

    function watchOffline() {
      window.addEventListener('offline',  () => offline.classList.add('show'))
      window.addEventListener('online',   () => offline.classList.remove('show'))
    }

    boot().catch(err => {
      // something went wrong before the page even loaded — show it
      console.error('boot failed:', err)
      document.getElementById('splash-name').textContent = 'failed to load — check console'
    })
  </script>
</body>
</html>
