apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web2native-build-worker-linux
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web2native-build-worker-linux
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
